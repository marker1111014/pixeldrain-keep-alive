name: Pixeldrain Keep Alive

on:
  schedule:
    # 這裡設定為每個月的 1 號與 15 號 UTC 時間 00:00 執行
    # 確保頻率遠低於 120 天的限制，同時增加容錯率
    - cron: '0 0 1,15 * *'
  workflow_dispatch: 
    # 加上這個設定，讓你可以隨時在 GitHub 網頁上手動點擊按鈕執行，方便測試

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # 因為只有 requests 一個套件，直接在這裡安裝，省去建立 requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        run: python keep_alive.py
